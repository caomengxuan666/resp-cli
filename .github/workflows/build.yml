name: Build and Release

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run tests
      run: cargo test

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build
      run: cargo build --release
    
    - name: Rename binary (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: mv target/release/resp-cli target/release/resp-cli-linux
    
    - name: Rename binary (macOS)
      if: matrix.os == 'macos-latest'
      run: mv target/release/resp-cli target/release/resp-cli-macos
    
    - name: Rename binary (Windows)
      if: matrix.os == 'windows-latest'
      run: mv target/release/resp-cli.exe target/release/resp-cli-windows.exe

    - name: Strip debug symbols (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: strip target/release/resp-cli-linux

    - name: Strip debug symbols (macOS)
      if: matrix.os == 'macos-latest'
      run: strip target/release/resp-cli-macos
    
    - name: Upload artifact (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: resp-cli-linux
        path: target/release/resp-cli-linux
    
    - name: Upload artifact (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: resp-cli-macos
        path: target/release/resp-cli-macos
    
    - name: Upload artifact (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: resp-cli-windows
        path: target/release/resp-cli-windows.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: resp-cli-linux
        path: ./artifacts
    
    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: resp-cli-macos
        path: ./artifacts
    
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: resp-cli-windows
        path: ./artifacts
    
    - name: Make binaries executable
      run: chmod +x ./artifacts/resp-cli-linux ./artifacts/resp-cli-macos
    
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ./artifacts/resp-cli-linux
          ./artifacts/resp-cli-macos
          ./artifacts/resp-cli-windows.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
